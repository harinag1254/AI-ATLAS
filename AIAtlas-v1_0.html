  --shadow-in: inset -4px -4px 10px rgba(255,255,255,0.88), inset 4px 4px 10px rgba(163,163,154,0.55);
}
:focus-visible{outline:3px solid #006666;outline-offset:3px;border-radius:6px}
.nav-tab:hover{color:#1E2938!important;box-shadow:-5px -5px 12px rgba(255,255,255,0.88),5px 5px 12px rgba(163,163,154,0.55)!important}
.cta-btn:hover{box-shadow:-6px -6px 10px rgba(255,255,255,0.25),6px 6px 12px rgba(0,50,50,0.5)!important}
.chip:hover{box-shadow:-4px -4px 8px rgba(255,255,255,0.88),4px 4px 8px rgba(163,163,154,0.5)!important;color:#006666!important}
.chip:active{box-shadow:inset -3px -3px 6px rgba(255,255,255,0.88),inset 3px 3px 6px rgba(163,163,154,0.5)!important}
.cat-card:hover{box-shadow:-6px -6px 14px rgba(255,255,255,0.88),6px 6px 14px rgba(163,163,154,0.55)!important}
.cat-card:active{box-shadow:inset -4px -4px 10px rgba(255,255,255,0.88),inset 4px 4px 10px rgba(163,163,154,0.55)!important}
.tool-card:hover{box-shadow:-8px -8px 18px rgba(255,255,255,0.9),8px 8px 18px rgba(163,163,154,0.6)!important}
.tool-card[data-trending="true"]{box-shadow:-6px -6px 14px rgba(255,255,255,0.88),6px 6px 14px rgba(163,163,154,0.55),inset 0 3px 0 #006666!important}
.brand-icon-img{filter:grayscale(0.5) brightness(0.95);transition:filter 0.2s}
.tool-card:hover .brand-icon-img{filter:grayscale(0) brightness(1)}
.brand-icon{box-shadow:-3px -3px 6px rgba(255,255,255,0.88),3px 3px 6px rgba(163,163,154,0.45)!important;border:none!important}
.icon-btn:hover{box-shadow:-4px -4px 8px rgba(255,255,255,0.88),4px 4px 8px rgba(163,163,154,0.5)!important}
.icon-btn:active{box-shadow:inset -3px -3px 6px rgba(255,255,255,0.88),inset 3px 3px 6px rgba(163,163,154,0.5)!important}
.expand-btn:hover{box-shadow:-4px -4px 8px rgba(255,255,255,0.88),4px 4px 8px rgba(163,163,154,0.5)!important;color:#006666!important}
.expand-btn:active{box-shadow:inset -3px -3px 6px rgba(255,255,255,0.88),inset 3px 3px 6px rgba(163,163,154,0.5)!important}
.filter-chip:hover,.filter-btn:hover{box-shadow:-4px -4px 8px rgba(255,255,255,0.88),4px 4px 8px rgba(163,163,154,0.5)!important;color:#006666!important}
.filter-chip:active,.filter-btn:active{box-shadow:inset -3px -3px 6px rgba(255,255,255,0.88),inset 3px 3px 6px rgba(163,163,154,0.5)!important}
.picker-btn:hover{box-shadow:-5px -5px 12px rgba(255,255,255,0.88),5px 5px 12px rgba(163,163,154,0.55)!important}
.region-card:hover{box-shadow:-5px -5px 12px rgba(255,255,255,0.88),5px 5px 12px rgba(163,163,154,0.55)!important}
.search-wrap:focus-within{box-shadow:inset -5px -5px 12px rgba(255,255,255,0.88),inset 5px 5px 12px rgba(163,163,154,0.55)!important}
.search-input::placeholder{color:#9BA8B5}
.select option{background:#E7E5E4;color:#1E2938}
.nav-tabs-desktop::-webkit-scrollbar{display:none}
.skeleton{background:linear-gradient(90deg,#E7E5E4 25%,#D8D6D5 50%,#E7E5E4 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tickerFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ticker-fade{animation:tickerFade 0.35s ease}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(163,163,154,0.4);border-radius:2px}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#E7E5E4;border-top:none;box-shadow:0 -6px 20px rgba(163,163,154,0.35);padding:6px 4px 10px;z-index:200;flex-direction:row;align-items:center}
.recharts-cartesian-grid line{stroke:rgba(163,163,154,0.25)!important}
.recharts-text{fill:#8896A5!important;font-family:'Space Mono',monospace!important}
.recharts-legend-item-text{color:#4A5568!important;font-family:'Space Mono',monospace!important;font-size:10px!important}
@media(max-width:768px){
  .nav-tabs-desktop{display:none!important}
  .nav-cta-desktop{display:none!important}
  .mobile-nav{display:flex!important}
  #main-content{padding-bottom:80px!important}
  .stats-grid{grid-template-columns:repeat(2,1fr)!important}
  .chart-grid{grid-template-columns:1fr!important}
}
@media(max-width:520px){.stats-grid{grid-template-columns:repeat(2,1fr)!important}}
